<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Work statistics</title>
    <link rel="icon" href="data:,">
</head>
<body>
    <h1>Тест Supabase</h1>
    <button onclick="testSupabase()">Тест</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Прямо здесь, без отдельных файлов
        const SUPABASE_URL = 'https://ваш_проект.supabase.co';
        const SUPABASE_ANON_KEY = 'ваш_anon_ключ';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        console.log('Supabase готов:', supabase);

        async function testSupabase() {
            const { data, error } = await supabase
                .from('Consultation_scenario')
                .select('*');

            if (error) {
                console.error('Ошибка:', error);
                alert('Ошибка: ' + error.message);
            } else {
                console.log('Данные:', data);
                alert('Успех! Найдено записей: ' + (data?.length || 0));
            }
        }
    </script>
</body>
</html>
