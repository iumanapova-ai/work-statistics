<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work statistics — Управление данными</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📊 Статистика работы</h1>
            <p class="subtitle">Работа с несколькими таблицами</p>

            <!-- Вкладки для выбора таблицы -->
            <div class="tabs">
                <button class="tab-btn active" data-table="Consultation_scenario">📋 Сценарии консультаций</button>
                <button class="tab-btn" data-table="duty_room">🚪 Дежурка</button>
            </div>

            <!-- Форма для Consultation_scenario -->
            <div id="consultationForm" class="form-block">
                <h3>📝 Добавить консультацию</h3>
                <div class="form-row">
                    <input type="url" id="consultationLink" placeholder="Ссылка на консультацию" class="flex-2">
                    <textarea id="consultationComment" rows="1" placeholder="Комментарий" class="flex-3"></textarea>
                    <button id="addConsultationBtn" class="btn btn-primary">➕ Добавить запись</button>
                </div>
            </div>

            <!-- Форма для duty_room -->
            <div id="dutyRoomForm" class="form-block" style="display: none;">
            <h3>🚪 Добавить запись в дежурку</h3>

            <div class="form-group">
                <label>📅 Период *</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="date" id="dutyPeriodFrom" style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                    <span>—</span>
                    <input type="date" id="dutyPeriodTo" style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                </div>
            </div>

            <div class="form-group">
                <label>🔢 Количество *</label>
                <input type="number" id="dutyQuantity" placeholder="8" class="full-width">
            </div>

            <div class="form-group">
                <label>📋 Меры (можно добавить несколько)</label>
                <div id="measuresContainer"></div>
                <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                    <button type="button" id="addNewTypeBtn" class="btn btn-measure">➕ Новый вид</button>
                    <button type="button" id="addNewSolutionBtn" class="btn btn-measure">➕ Новое решение</button>
                    <button type="button" id="addTaskBtn" class="btn btn-measure">➕ Задача</button>
                    <button type="button" id="addErrorBtn" class="btn btn-measure">➕ Ошибка</button>
                </div>
            </div>

            <!-- Кнопка добавления справа, как в консультациях -->
            <div style="display: flex; justify-content: flex-end;">
                <button id="addDutyBtn" class="btn btn-primary">➕ Добавить запись</button>
            </div>
        </div>
        </div>

        <!-- Таблица с данными -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>📋 Все записи</h2>
                <button id="exportSelectedBtn" class="btn btn-success">📎 Экспорт выбранных</button>
            </div>

            <!-- Панель фильтров (всегда видима) -->
            <div class="filter-panel" style="margin-bottom: 20px;">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>📅 Дата (ОТ)</label>
                        <input type="date" id="filterDateFrom">
                    </div>
                    <div class="filter-group">
                        <label>📅 Дата (ДО)</label>
                        <input type="date" id="filterDateTo">
                    </div>
                    <div class="filter-group">
                        <label>🗂️ Таблица</label>
                        <select id="filterTable">
                            <option value="all">Все таблицы</option>
                            <option value="consultation">Сценарии консультаций</option>
                            <option value="duty">Дежурка</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>🔎 Поиск по тексту</label>
                        <input type="text" id="filterText" placeholder="Поиск...">
                    </div>
                    <button id="clearFiltersBtn" class="btn btn-sm">Сбросить</button>
                </div>
            </div>

            <div class="table-wrapper">
                <div id="loadingSpinner" class="spinner-container" style="display: none;">
                    <div class="spinner"></div>
                    <p>Загрузка данных...</p>
                </div>

                <div style="overflow-x: auto;">
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="selectAllCheckbox"></th>
                                <th style="width: 60px;">№</th>
                                <th style="width: 180px;">Источник</th>
                                <th>Данные</th>
                                <th style="width: 110px;">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="5" style="text-align: center;">Загрузка...<\/td><\/tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
