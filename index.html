<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work statistics — Управление данными</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="container">
        <!-- Панель управления -->
        <div class="card">
            <h1>📊 Управление консультациями и дежурством</h1>
            <div class="subtitle">Работа с несколькими таблицами</div>

            <!-- Выбор таблицы -->
            <div class="form-group">
                <label>🗂️ Выберите таблицу</label>
                <select id="tableSelector">
                    <option value="Consultation_scenario">📋 Сценарии консультаций</option>
                    <option value="duty_room">🚪 Duty room (дежурка)</option>
                </select>
                <button id="switchTableBtn" class="small-btn">Переключиться</button>
            </div>

            <!-- Форма для Consultation_scenario -->
            <div id="consultationForm" class="form-block">
                <h3>📝 Добавить консультацию</h3>
                <div class="form-row">
                    <input type="url" id="consultationLink" placeholder="Ссылка на консультацию" style="flex: 2;">
                    <textarea id="consultationComment" rows="1" placeholder="Комментарий" style="flex: 3;"></textarea>
                    <button id="addConsultationBtn">➕ Добавить</button>
                </div>
            </div>

            <!-- Форма для duty_room -->
            <div id="dutyRoomForm" class="form-block" style="display: none;">
                <h3>🚪 Добавить запись в дежурку</h3>

                <div class="form-row">
                    <input type="text" id="dutyPeriod" placeholder="Период (с ПН по ВСКР)" style="flex: 2;">
                    <input type="number" id="dutyQuantity" placeholder="Количество" style="flex: 1;">
                </div>

                <div class="form-row">
                    <select id="dutyMeasures" style="flex: 1;">
                        <option value="">— Меры —</option>
                        <option value="Предупреждение">Предупреждение</option>
                        <option value="Выговор">Выговор</option>
                        <option value="Лишение премии">Лишение премии</option>
                        <option value="Увольнение">Увольнение</option>
                        <option value="Благодарность">Благодарность</option>
                        <option value="Премия">Премия</option>
                    </select>

                    <select id="dutyNewType" style="flex: 1;">
                        <option value="">— Новый вид —</option>
                        <option value="Консультация">Консультация</option>
                        <option value="Обучение">Обучение</option>
                        <option value="Проверка">Проверка</option>
                        <option value="Отчёт">Отчёт</option>
                    </select>

                    <select id="dutyNewSolution" style="flex: 1;">
                        <option value="">— Новое решение —</option>
                        <option value="Одобрено">Одобрено</option>
                        <option value="Отклонено">Отклонено</option>
                        <option value="На доработке">На доработке</option>
                        <option value="Внедрено">Внедрено</option>
                    </select>
                </div>

                <div class="form-row">
                    <input type="url" id="dutyErrorLink" placeholder="⚠️ Ошибка (ссылка)" style="flex: 1;">
                    <input type="url" id="dutyTaskLink" placeholder="🚀 Задача в разработку (ссылка)" style="flex: 1;">
                    <button id="addDutyBtn">➕ Добавить в дежурку</button>
                </div>
            </div>

            <!-- Кнопки действий -->
            <div class="button-group">
                <button id="refreshBtn" class="refresh-btn">🔄 Обновить</button>
                <button id="combinedReportBtn" class="combine-btn">📊 Общий список</button>
            </div>
        </div>

        <!-- Таблица с данными -->
        <div class="card">
            <h2 id="currentTableTitle">📋 Сценарии консультаций</h2>
            <div style="overflow-x: auto;">
                <table class="records-table" id="recordsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Данные</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="3" style="text-align: center;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
